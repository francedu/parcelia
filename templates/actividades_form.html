{% extends 'base.html' %}
{% block title %}Categoría{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ 'Editar categoría' if actividad else 'Nueva categoría' }}</h1>
<div class="card shadow-sm"><div class="card-body"><form method="post" class="row g-3">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control" name="nombre" value="{{ actividad['nombre'] if actividad else '' }}" required></div>
  <div class="col-md-3"><label class="form-label">Fecha</label><input class="form-control" type="date" name="fecha" value="{{ actividad['fecha'] if actividad else now.strftime('%Y-%m-%d') }}" required></div>
  <div class="col-12"><label class="form-label">Descripción</label><textarea class="form-control" name="descripcion" rows="4">{{ actividad['descripcion'] if actividad else '' }}</textarea></div>
  <div class="col-12 d-flex gap-2"><button class="btn btn-primary">Guardar</button><a class="btn btn-outline-secondary" href="{{ url_for('actividades_list') }}">Cancelar</a></div>
</form></div></div>
{% endblock %}
