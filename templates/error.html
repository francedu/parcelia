{% extends "base.html" %}
{% block title %}{{ error_title }}{% endblock %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="page-eyebrow mb-2">Error {{ error_code }}</div>
          <h1 class="h3 mb-3">{{ error_title }}</h1>
          <p class="text-muted mb-4">{{ error_message }}</p>
          <div class="d-flex gap-2 justify-content-center flex-wrap">
            <a class="btn btn-primary" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('landing') }}">Ir al inicio</a>
            {% if current_user.is_authenticated %}
            <a class="btn btn-outline-secondary" href="{{ url_for('logout') }}">Cerrar sesión</a>
            {% else %}
            <a class="btn btn-outline-secondary" href="{{ url_for('login') }}">Ir al login</a>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
